<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Webpage</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: Arial, sans-serif;
line-height: 1.6;
}
header {
background: #0077cc;
color: white;
text-align: center;
padding: 20px;
}
nav {
display: flex;
justify-content: center;
gap: 20px;
background: #333;
padding: 15px;
}
nav a {
color: white;
text-decoration: none;
}
main {
padding: 20px;
min-height: 300px;
}
footer {
background: #0077cc;
color: white;
text-align: center;
padding: 15px;
}
/* Tablet */
@media (max-width: 768px) {
nav {
flex-direction: column;
align-items: center;
}
main {
padding: 15px;
}
}
/* Mobile */
@media (max-width: 480px) {
header h1 {
font-size: 1.5rem;
}
nav {
gap: 10px;
}
main {
font-size: 0.95rem;
}
footer {
font-size: 0.9rem;
}
}
</style>
</head>
<body>
<header>
<h1>Responsive Website</h1>
</header>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
<main>
<h2>Welcome</h2>
<p>
This is a simple responsive webpage. The layout changes based on
the screen size using CSS media queries.
</p>
</main>
<footer>
<p>&copy; Responsive Website</p>
</footer>
</body>
</html>
